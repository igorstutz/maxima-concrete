  - name: settings
    label: "Site Settings"
    editor:
      preview: false
    files:
      - name: navigation
        label: "Navigation (menu)"
        file: src/content/settings/navigation.json
        fields:
          - name: raw
            label: "⚠ Edite com cuidado"
            widget: code
            output_code_only: true
            default_language: json
      - name: footer
        label: Footer
        file: src/content/settings/footer.json
        fields:
          - name: raw
            label: "⚠ Edite com cuidado"
            widget: code
            output_code_only: true
            default_language: json
      - name: tracking
        label: "Tracking & Scripts"
        file: src/content/settings/tracking.json
        fields:
          - name: gtmId
            label: "Google Tag Manager ID"
            widget: string
            required: false
          - name: extraBodyCode
            label: "Extra body code"
            widget: text
            required: false
  - name: data
    label: Data
    editor:
      preview: false
    files:
      - name: service_areas
        label: "Service Areas (cidades)"
        file: src/content/data/service-areas.json
        fields:
          - name: areas
            label: Cities
            widget: list
            root: true
            fields:
              - name: slug
                label: "Slug (URL)"
                widget: string
              - name: name
                label: Name
                widget: string
              - name: description
                label: Description
                widget: text
                required: false
              - name: image
                label: Image
                widget: image
                required: false
                choose_url: true
      - name: google_reviews
        label: "Google Reviews (destacados)"
        file: src/content/data/google-reviews.json
        fields:
          - name: reviews
            label: Reviews
            widget: list
            root: true
            fields:
              - name: name
                label: "Reviewer name"
                widget: string
              - name: rating
                label: "Rating (1-5)"
                widget: number
                value_type: int
                min: 1
                max: 5
              - name: comment
                label: Comment
                widget: text
                required: false
              - name: date
                label: "Date (ISO)"
                widget: string
                required: false
              - name: featured
                label: Featured
                widget: boolean
                required: false
              - name: photo
                label: Photo
                widget: image
                required: false
                choose_url: true
